<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Drum Kit</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet">
</head>

<body>

  <h1 id="title">Drum 🥁 Kit</h1>

  <div class="volume-control">
    <label for="volumeSlider">Volume</label>
    <input id="volumeSlider" type="range" min="0" max="1" step="0.1" value="1" class="slider">
    <span id="volumeLabel">100%</span>
  </div>

  <div class="recorder-section">
    <h2 class="recorder-title">Record Your Beats Here!</h2>
    <div class="recording-controls">
      <button id="recordBtn" class="control-btn record-btn">● Record</button>
      <button id="playBtn" class="control-btn play-btn" disabled>▶ Play</button>
      <button id="stopBtn" class="control-btn stop-btn" disabled>⏹ Stop</button>
      <button id="clearBtn" class="control-btn clear-btn" disabled>✕ Clear</button>
      <span id="recordingStatus" class="recording-status">Ready</span>
    </div>
  </div>

  <div class="set">
    <button class="w drum">w</button>
    <button class="a drum">a</button>
    <button class="s drum">s</button>
    <button class="d drum">d</button>
    <button class="j drum">j</button>
    <button class="k drum">k</button>
    <button class="l drum">l</button>
  </div>

<script src="index.js"></script>
  <footer>
    Made with ❤️ in India.
  </footer>
</body>

</html>
